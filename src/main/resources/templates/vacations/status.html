<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estatus de Vacaciones</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/status.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/home">Sistema de Vacaciones</a>
    <form method="post" action="/logout">
      <button class="btn btn-outline-light btn-sm">Salir</button>
    </form>
  </div>
</nav>

<div class="container">

  <!-- HERO -->
  <div class="status-hero">
    <div>
      <div class="hero-label">Colaborador</div>
      <h4>Estatus de Vacaciones</h4>
      <div class="hero-user">
        Usuario: <b th:text="${username}"></b>
      </div>
    </div>
    <div class="d-flex gap-2 flex-shrink-0">
      <a class="btn-hero-new" href="/vacations/request">+ Nueva solicitud</a>
      <a class="btn-hero-back no-loader" href="/home">← Volver</a>
    </div>
  </div>

  <!-- SIN REGISTROS -->
  <div class="empty-state" th:if="${#lists.isEmpty(requests)}">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Sin solicitudes registradas</div>
    <div class="empty-sub">Aún no tienes solicitudes. ¡Crea una nueva!</div>
  </div>

  <!-- TABLA -->
  <div class="table-card" th:if="${!#lists.isEmpty(requests)}">
    <div class="table-card-header">
      <span>📋 Mis solicitudes</span>
      <span class="req-count" th:text="${#lists.size(requests)}">0</span>
    </div>
    <div class="table-responsive">
      <table class="status-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Rango de fechas</th>
            <th>Días</th>
            <th>Estatus</th>
            <th>Comentario</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${requests}">

            <td class="id-cell" th:text="'#' + ${r.id}"></td>

            <td>
              <div class="date-range">
                <span class="date-cell"
                      th:text="${#temporals.format(r.startDate,'dd/MM/yyyy')}"></span>
                <span class="arr">→</span>
                <span class="date-cell"
                      th:text="${#temporals.format(r.endDate,'dd/MM/yyyy')}"></span>
              </div>
            </td>

            <td>
              <span class="days-chip" th:text="${r.days}"></span>
            </td>

            <td>
              <span class="badge-pending"
                    th:if="${r.status == 'PENDING'}">⏳ PENDIENTE</span>
              <span class="badge-approved"
                    th:if="${r.status == 'APPROVED'}">✓ APROBADA</span>
              <span class="badge-rejected"
                    th:if="${r.status == 'REJECTED'}">✕ RECHAZADA</span>
              <span class="badge-other"
                    th:if="${r.status != 'PENDING' and r.status != 'APPROVED' and r.status != 'REJECTED'}"
                    th:text="${r.status}"></span>
            </td>

            <td>
              <span class="comment-cell"
                    th:text="${r.adminComment != null ? r.adminComment : '—'}"></span>
            </td>

          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<!-- ========================= -->
<!-- LOADER GLOBAL -->
<!-- ========================= -->
<div id="globalLoader" class="global-loader" aria-hidden="true">
  <div class="global-loader__box">
    <div class="global-loader__spinner"></div>
    <div class="global-loader__text">Cargando...</div>
  </div>
</div>

<link rel="stylesheet" href="/css/global-loader.css">
<script src="/js/global-loader.js"></script>
</body>
</html>
