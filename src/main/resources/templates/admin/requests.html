<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revisar Solicitudes</title>

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/admin-requests.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

 
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid d-flex align-items-center justify-content-between">
    <a class="navbar-brand" href="/home">Sistema de Vacaciones</a>
    <form method="post" action="/logout">
      <button class="btn btn-outline-light btn-sm">Salir</button>
    </form>
  </div>
</nav>

<div class="container mt-4">

  <!-- HERO -->
  <div class="admin-hero shadow-soft mb-3">
    <div>
      <div class="hero-label">Panel Admin</div>
      <h4 class="mb-1">Revisar Solicitudes</h4>
      <div class="muted">Solo se muestran solicitudes <b>PENDIENTES</b>.</div>
    </div>
    <a class="btn-back" href="/home">← Volver</a>
  </div>

  <!-- EMPTY STATE -->
  <div id="emptyState" th:if="${#lists.isEmpty(requests)}" class="empty-state">
    <div class="empty-icon">📭</div>
    <div class="empty-title">No hay solicitudes pendientes</div>
    <div class="empty-sub">Todas las solicitudes han sido atendidas.</div>
  </div>

  <!-- TABLE -->
  <div th:if="${!#lists.isEmpty(requests)}" class="requests-card">

    <div class="req-toolbar">
      <div class="req-toolbar-left">
        <span class="req-toolbar-title">Pendientes</span>
        <span class="pending-count" id="pendingCount"
              th:text="${#lists.size(requests)}">0</span>
      </div>
      <input id="reqSearch" class="req-search" placeholder="🔍  Buscar usuario, mail o ID...">
    </div>

    <div class="table-responsive">
      <table class="req-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Colaborador</th>
            <th>Rango de fechas</th>
            <th>Días</th>
            <th>Estatus</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="reqTbody">
          <tr th:each="r : ${requests}" th:attr="data-row-id=${r.id}">

            <td style="color:#484f58; font-size:0.78rem;" th:text="'#' + ${r.id}"></td>

            <td>
              <div class="user-cell">
                <span class="user-name" th:text="${r.user != null ? r.user.username : 'N/A'}"></span>
                <span class="user-email" th:text="${r.user != null ? r.user.email : ''}"></span>
              </div>
            </td>

            <td>
              <div class="date-range">
                <span th:text="${#temporals.format(r.startDate,'dd/MM/yyyy')}"></span>
                <span class="arrow">→</span>
                <span th:text="${#temporals.format(r.endDate,'dd/MM/yyyy')}"></span>
              </div>
            </td>

            <td>
              <span class="days-badge" th:text="${r.days}"></span>
            </td>

            <td>
              <span class="badge-pending">PENDIENTE</span>
            </td>

            <td>
              <div class="d-flex gap-2">
                <button type="button"
                        class="btn-approve"
                        th:attr="data-id=${r.id}"
                        onclick="approveRequest(this)">
                  ✓ Aprobar
                </button>
                <button type="button"
                        class="btn-reject"
                        th:attr="data-id=${r.id}"
                        onclick="rejectRequest(this)">
                  ✕ Rechazar
                </button>
              </div>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
  // ===== Buscador
  document.getElementById('reqSearch')?.addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.req-table tbody tr').forEach(tr => {
      tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // ===== Aprobar
  async function approveRequest(btn) {
    const id = btn.getAttribute("data-id");
    if (!confirm("¿Aprobar solicitud #" + id + "?")) return;

	  setRowLoading(id, true);

	  try {
	    const res = await fetch(`/admin/requests/${id}/approve`, {
	      method: "POST",
	      headers: {
	        "X-Requested-With": "XMLHttpRequest"
	      }
	    });

	    if (res.ok) {
	      
	    } else {
	      setRowLoading(id, false);
	      alert("Se aprobó la solicitud.");
		  window.location.reload(true); // 🔥 recarga completa
	    }
	  } catch (e) {
	    setRowLoading(id, false);
	    alert("Error de red.");
	  }
	}

  // ===== Rechazar
  // ===== Rechazar
  async function rejectRequest(btn) {
    const id = btn.getAttribute("data-id");
    if (!confirm("¿Rechazar solicitud #" + id + "?")) return;

    setRowLoading(id, true);

    try {
      const res = await fetch(`/admin/requests/${id}/reject`, {
        method: "POST",
        headers: {
          "X-Requested-With": "XMLHttpRequest"
        }
      });

      if (res.ok) {
        
      } else {
        setRowLoading(id, false);
        alert("Se rechazo la solicitud.");
		window.location.reload(true); // 🔥 recarga completa desde servidor
      }
    } catch (e) {
      setRowLoading(id, false);
      alert("Error de red.");
    }
  }

  function setRowLoading(id, isLoading) {
    const row = document.querySelector(`tr[data-row-id="${id}"]`);
    if (!row) return;
    const buttons = row.querySelectorAll('button');
    buttons.forEach(b => b.disabled = isLoading);
    if (isLoading) {
      row.classList.add('row-loading');
      buttons.forEach(b => b.dataset.originalText = b.innerHTML);
      buttons[0].innerHTML = 'Procesando...';
      buttons[1].innerHTML = 'Procesando...';
    } else {
      row.classList.remove('row-loading');
      buttons.forEach(b => b.innerHTML = b.dataset.originalText || b.innerHTML);
    }
  }

  function removeRow(id) {
    const row = document.querySelector(`tr[data-row-id="${id}"]`);
    if (row) row.remove();

    const remaining = document.querySelectorAll('#reqTbody tr').length;
    const countEl = document.getElementById('pendingCount');
    if (countEl) countEl.textContent = remaining;

    if (remaining === 0) {
      document.querySelector('.requests-card')?.remove();
      const wrap = document.querySelector('.container.mt-4');
      if (wrap) {
        const div = document.createElement('div');
        div.id = 'emptyState';
        div.className = 'empty-state';
        div.innerHTML = '<div class="empty-icon">📭</div><div class="empty-title">No hay solicitudes pendientes</div><div class="empty-sub">Todas las solicitudes han sido atendidas.</div>';
        wrap.appendChild(div);
      }
    }
  }
</script>

</body>
</html>
