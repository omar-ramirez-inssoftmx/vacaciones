<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Historial de Solicitudes</title>

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Flatpickr ── */
    .flatpickr-calendar {
      background: #1c2128;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      font-family: inherit;
      overflow: hidden;
      padding: 0;
      width: 266px !important;
    }
    .flatpickr-months {
      background: #1e3a5f;
      padding: .6rem .5rem;
      border-radius: 12px 12px 0 0;
    }
    .flatpickr-month { height: 36px; color: #fff; }
    .flatpickr-current-month { font-size: .95rem; font-weight: 600; color: #fff; padding-top: 6px; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { background: #1e3a5f; color: #fff; font-weight: 600; border: none; font-size: .95rem; }
    .flatpickr-current-month .flatpickr-monthDropdown-months option { background: #1e3a5f; color: #fff; }
    .flatpickr-current-month input.cur-year { color: #fff; font-weight: 600; font-size: .95rem; }
    .flatpickr-prev-month, .flatpickr-next-month { color: #fff !important; fill: #fff !important; padding: 8px 10px; }
    .flatpickr-prev-month:hover, .flatpickr-next-month:hover { background: rgba(255,255,255,.15); border-radius: 6px; }
    .flatpickr-prev-month svg, .flatpickr-next-month svg { fill: #fff; }
    .flatpickr-weekdays { background: #161b22; padding: .3rem 0; width: 266px !important; }
    .flatpickr-weekdaycontainer { width: 266px !important; }
    .flatpickr-weekday { color: #388bfd; font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; max-width: 38px; flex-basis: 38px; }
    .flatpickr-days { border: none; width: 266px !important; background: #1c2128; }
    .dayContainer { padding: .3rem .4rem .5rem; gap: 0; width: 266px !important; min-width: 266px !important; max-width: 266px !important; }
    .flatpickr-day { border-radius: 8px; height: 36px; line-height: 36px; font-size: .85rem; color: #c9d1d9; border: none; max-width: 36px; flex-basis: 36px; }
    .flatpickr-day:hover { background: rgba(56,139,253,0.15); color: #58a6ff; }
    .flatpickr-day.selected, .flatpickr-day.selected:hover { background: #388bfd; color: #fff; font-weight: 700; }
    .flatpickr-day.today { border: 2px solid #388bfd; color: #388bfd; font-weight: 700; }
    .flatpickr-day.today:hover { background: #388bfd; color: #fff; }
    .flatpickr-day.flatpickr-disabled, .flatpickr-day.flatpickr-disabled:hover { background: transparent; color: #30363d; text-decoration: line-through; cursor: not-allowed; opacity: .5; }
    .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color: #484f58; }

    /* ── HERO ── */
    .admin-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-radius: 16px;
      padding: 1.75rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .admin-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(163,113,247,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a371f7;
      margin-bottom: 0.3rem;
    }
    .admin-hero h4 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.3rem; }
    .admin-hero .muted { font-size: 0.82rem; color: #6e7681; }
    .btn-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: #8b949e;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-back:hover { color: #e6edf3; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }

    /* ── FILTROS CARD ── */
    .filter-card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .filter-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .filter-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #484f58;
    }
    .filter-body { padding: 1.25rem 1.5rem; }

    /* ── FORM ── */
    .form-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 0.35rem;
      letter-spacing: 0.03em;
    }
    .form-control, .form-select {
      background: #0d1117 !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 8px !important;
      color: #e6edf3 !important;
      font-size: 0.85rem !important;
      padding: 0.5rem 0.85rem !important;
      font-family: inherit !important;
      transition: border-color 0.2s, box-shadow 0.2s !important;
    }
    .form-control::placeholder { color: #484f58 !important; }
    .form-control:focus, .form-select:focus {
      border-color: rgba(56,139,253,0.5) !important;
      box-shadow: 0 0 0 3px rgba(56,139,253,0.1) !important;
      outline: none !important;
    }
    .form-select option { background: #161b22; }

    .btn-filter {
      background: #388bfd;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-filter:hover { background: #58a6ff; }
    .btn-clear {
      background: transparent;
      color: #8b949e;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.5rem 1.25rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-clear:hover { color: #e6edf3; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04); }

    /* Fecha input con icono */
    .date-input-wrap { position: relative; }
    .date-input-wrap .form-control { padding-right: 2.2rem !important; }
    .date-icon-btn {
      position: absolute;
      top: 50%; right: 0.5rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      line-height: 1;
      font-size: 0.9rem;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .date-icon-btn:hover { opacity: 1; }

    /* ── RESULTS CARD ── */
    .results-card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
    }
    .results-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .results-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #484f58;
    }
    .results-count {
      background: rgba(163,113,247,0.12);
      border: 1px solid rgba(163,113,247,0.2);
      color: #a371f7;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
    }

    /* ── TABLE ── */
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table thead tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .history-table thead th {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #484f58;
      padding: 0.75rem 1rem;
      white-space: nowrap;
    }
    .history-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .history-table tbody tr:last-child { border-bottom: none; }
    .history-table tbody tr:hover { background: rgba(255,255,255,0.02); }
    .history-table tbody td { padding: 0.85rem 1rem; color: #c9d1d9; vertical-align: middle; }

    .empty-cell { color: #484f58; font-size: 0.85rem; text-align: center; padding: 3rem 1rem !important; }

    .user-cell { display: flex; flex-direction: column; gap: 0.1rem; }
    .user-name { font-weight: 600; color: #e6edf3; font-size: 0.88rem; }
    .user-email { font-size: 0.75rem; color: #6e7681; }

    .date-range { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: #8b949e; white-space: nowrap; }
    .date-range .arrow { color: #30363d; font-size: 0.7rem; }

    .days-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(56,139,253,0.1);
      color: #388bfd;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      min-width: 32px;
    }

    .badge-approved {
      background: rgba(63,185,80,0.12);
      border: 1px solid rgba(63,185,80,0.25);
      color: #3fb950;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.22rem 0.6rem;
      border-radius: 20px;
    }
    .badge-rejected {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.22);
      color: #f85149;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.22rem 0.6rem;
      border-radius: 20px;
    }

    .decided-by { font-size: 0.82rem; color: #8b949e; }
    .decided-at { font-size: 0.78rem; color: #6e7681; font-variant-numeric: tabular-nums; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .admin-hero   { animation: fadeUp 0.3s ease both; }
    .filter-card  { animation: fadeUp 0.3s 0.05s ease both; }
    .results-card { animation: fadeUp 0.3s 0.1s ease both; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid d-flex align-items-center justify-content-between">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/home">
      <span>Sistema de Vacaciones</span>
    </a>
    <form method="post" action="/logout">
      <button class="btn btn-outline-light btn-sm">Salir</button>
    </form>
  </div>
</nav>

<div class="container mt-4">

  <!-- HERO -->
  <div class="admin-hero shadow-soft mb-3">
    <div>
      <div class="hero-label">Panel Admin</div>
      <h4 class="mb-1">Historial de Solicitudes</h4>
      <div class="muted">Solicitudes ya resueltas (Aprobadas / Rechazadas).</div>
    </div>
    <a class="btn-back" href="/home">← Volver</a>
  </div>

  <!-- FILTROS -->
  <div class="filter-card">
    <div class="filter-header">
      <span class="filter-title">🔍 Filtros</span>
    </div>
    <div class="filter-body">
      <form method="get" action="/admin/requests/history" class="row g-2 align-items-end">

        <div class="col-md-3">
          <label class="form-label">Estatus</label>
          <select class="form-select" name="status">
            <option value=""        th:selected="${status == null || status == ''}">TODAS</option>
            <option value="APPROVED" th:selected="${status == 'APPROVED'}">APROBADAS</option>
            <option value="REJECTED" th:selected="${status == 'REJECTED'}">RECHAZADAS</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Buscar (usuario/email)</label>
          <input class="form-control" name="q" placeholder="Ej: juan / correo@..." th:value="${q}">
        </div>

        <div class="col-md-3">
          <label class="form-label">Desde</label>
          <div class="date-input-wrap">
            <input class="form-control"
                   type="text"
                   id="fromDate"
                   name="from"
                   autocomplete="off"
                   placeholder="dd/mm/yyyy"
                   maxlength="10"
                   th:value="${from}">
            <button type="button" id="fromDateBtn" class="date-icon-btn">📅</button>
          </div>
        </div>

        <div class="col-md-3">
          <label class="form-label">Hasta</label>
          <div class="date-input-wrap">
            <input class="form-control"
                   type="text"
                   id="toDate"
                   name="to"
                   autocomplete="off"
                   placeholder="dd/mm/yyyy"
                   maxlength="10"
                   th:value="${to}">
            <button type="button" id="toDateBtn" class="date-icon-btn">📅</button>
          </div>
        </div>

        <div class="col-md-2">
          <button class="btn-filter" type="submit">Filtrar</button>
        </div>

        <div class="col-md-2">
          <a class="btn-clear" href="/admin/requests/history">Limpiar</a>
        </div>

      </form>
    </div>
  </div>

  <!-- TABLA RESULTADOS -->
  <div class="results-card">
    <div class="results-header">
      <span class="results-title">Resultados</span>
      <span class="results-count" th:text="${#lists.size(requests)}">0</span>
    </div>

    <div class="table-responsive">
      <table class="history-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Colaborador</th>
            <th>Rango</th>
            <th>Días hábiles</th>
            <th>Estatus</th>
            <th>Resuelto por</th>
            <th>Fecha decisión</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="7" class="empty-cell">
              📭 No hay solicitudes con esos filtros.
            </td>
          </tr>

          <tr th:each="r : ${requests}">
            <td style="color:#484f58; font-size:0.78rem;" th:text="'#' + ${r.id}"></td>

            <td>
              <div class="user-cell">
                <span class="user-name" th:text="${r.user.username}"></span>
                <span class="user-email" th:text="${r.user.email}"></span>
              </div>
            </td>

            <td>
              <div class="date-range">
                <span th:text="${#temporals.format(r.startDate,'dd/MM/yyyy')}"></span>
                <span class="arrow">→</span>
                <span th:text="${#temporals.format(r.endDate,'dd/MM/yyyy')}"></span>
              </div>
            </td>

            <td><span class="days-badge" th:text="${r.days}"></span></td>

            <td>
              <span class="badge-approved" th:if="${r.status == 'APPROVED'}">✓ APROBADA</span>
              <span class="badge-rejected" th:if="${r.status == 'REJECTED'}">✕ RECHAZADA</span>
            </td>

            <td>
              <span class="decided-by" th:text="${r.decidedBy != null ? r.decidedBy : '—'}"></span>
            </td>

            <td>
              <span class="decided-at"
                    th:text="${r.decidedAt != null ? #temporals.format(r.decidedAt, 'dd/MM/yyyy HH:mm') : '—'}">
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
<script>
  const holidays = [
    "2026-01-01","2026-02-02","2026-03-16","2026-05-01",
    "2026-09-16","2026-11-16","2026-12-25"
  ];

  function initCalendar(selector, btnId) {
    const input = document.querySelector(selector);
    const btn   = document.getElementById(btnId);
    if (!input) return;

    const fp = flatpickr(selector, {
      dateFormat: "d/m/Y",
      allowInput: true,
      clickOpens: false,
      disableMobile: true,
      disable: [
        function(date) {
          const day = date.getDay();
          if (day === 0 || day === 6) return true;
          const formatted = date.toISOString().split("T")[0];
          return holidays.includes(formatted);
        }
      ],
      locale: "es"
    });

    if (btn) btn.addEventListener("click", () => fp.toggle());

    input.addEventListener("keydown", function(e) {
      const allowed = ["Backspace","Delete","Tab","ArrowLeft","ArrowRight"];
      if (allowed.includes(e.key)) return;
      if (!/^\d$/.test(e.key)) { e.preventDefault(); return; }
    });

    input.addEventListener("input", function() {
      let val = input.value.replace(/\D/g, "");
      if (val.length > 8) val = val.slice(0, 8);
      if (val.length >= 5) val = val.slice(0,2) + "/" + val.slice(2,4) + "/" + val.slice(4);
      else if (val.length >= 3) val = val.slice(0,2) + "/" + val.slice(2);
      input.value = val;

      if (val.length === 10) {
        const parts = val.split("/");
        const iso = `${parts[2]}-${parts[1]}-${parts[0]}`;
        const dateObj = new Date(iso + "T00:00:00");
        if (isNaN(dateObj)) { input.classList.add("is-invalid"); return; }
        const day = dateObj.getDay();
        if (day === 0 || day === 6 || holidays.includes(iso)) {
          input.classList.add("is-invalid");
          input.value = "";
          return;
        }
        input.classList.remove("is-invalid");
        fp.setDate(dateObj, false);
      } else {
        input.classList.remove("is-invalid");
      }
    });
  }

  initCalendar("#fromDate", "fromDateBtn");
  initCalendar("#toDate",   "toDateBtn");
</script>

</body>
</html>
