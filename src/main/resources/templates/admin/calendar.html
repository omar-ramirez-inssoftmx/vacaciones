<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Calendario de Ausencias</title>

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── HERO ── */
    .admin-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-radius: 16px;
      padding: 1.75rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .admin-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 0.3rem;
    }
    .admin-hero h4 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.3rem; }
    .admin-hero .muted { font-size: 0.82rem; color: #6e7681; }
    .btn-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: #8b949e;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-back:hover { color: #e6edf3; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }

    /* ── LEYENDA ── */
    .legend-wrap {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #8b949e;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-approved { background: #3fb950; }
    .dot-pending  { background: #d29922; }

    /* ── CALENDAR CARD ── */
    .calendar-card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* ── FULLCALENDAR OVERRIDES ── */

    /* Toolbar */
    .fc .fc-header-toolbar {
      background: rgba(13,17,23,0.7) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      border-radius: 12px !important;
      padding: 0.6rem 1rem !important;
      margin-bottom: 1.25rem !important;
    }
    .fc .fc-toolbar-title {
      color: #e6edf3 !important;
      font-weight: 700 !important;
      font-size: 1rem !important;
      font-family: inherit !important;
    }
    .fc .fc-button {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #8b949e !important;
      font-size: 0.78rem !important;
      font-weight: 600 !important;
      padding: 0.3rem 0.75rem !important;
      border-radius: 7px !important;
      font-family: inherit !important;
      transition: all 0.18s !important;
      text-transform: none !important;
      box-shadow: none !important;
    }
    .fc .fc-button:hover {
      background: rgba(255,255,255,0.1) !important;
      color: #e6edf3 !important;
      border-color: rgba(255,255,255,0.2) !important;
    }
    .fc .fc-button-active,
    .fc .fc-button:not(:disabled):active,
    .fc .fc-button-primary:not(:disabled).fc-button-active {
      background: rgba(56,139,253,0.2) !important;
      border-color: rgba(56,139,253,0.4) !important;
      color: #58a6ff !important;
    }
    .fc .fc-button-primary:focus { box-shadow: none !important; }

    /* Export PDF button */
    .fc .fc-exportPdf-button {
      background: rgba(56,189,248,0.1) !important;
      border: 1px solid rgba(56,189,248,0.25) !important;
      color: #38bdf8 !important;
    }
    .fc .fc-exportPdf-button:hover {
      background: rgba(56,189,248,0.2) !important;
      color: #7dd3fc !important;
    }

    /* Grid headers */
    .fc .fc-col-header-cell-cushion {
      color: #484f58 !important;
      font-size: 0.72rem !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
      text-decoration: none !important;
    }
    .fc .fc-col-header-cell { border-color: rgba(255,255,255,0.06) !important; }

    /* Day cells */
    .fc .fc-daygrid-day { border-color: rgba(255,255,255,0.04) !important; }
    .fc .fc-daygrid-day-number {
      color: #6e7681 !important;
      font-size: 0.8rem !important;
      font-weight: 600 !important;
      text-decoration: none !important;
    }
    .fc .fc-day-today {
      background: rgba(56,139,253,0.06) !important;
    }
    .fc .fc-day-today .fc-daygrid-day-number {
      color: #388bfd !important;
      background: rgba(56,139,253,0.15);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .fc .fc-day-other .fc-daygrid-day-number { color: #30363d !important; }

    /* Events */
    .fc .fc-event {
      border-radius: 6px !important;
      font-size: 0.75rem !important;
      font-weight: 600 !important;
      border: none !important;
      padding: 1px 5px !important;
    }
    .fc .fc-event, .fc .fc-event .fc-event-main,
    .fc .fc-event .fc-event-title, .fc .fc-event .fc-event-time,
    .fc .fc-event a { color: #ffffff !important; }

    /* List view */
    .fc .fc-list-day-cushion {
      background: rgba(255,255,255,0.04) !important;
      border-top: 1px solid rgba(255,255,255,0.06) !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    }
    .fc .fc-list-day-text, .fc .fc-list-day-text a,
    .fc .fc-list-day-side-text, .fc .fc-list-day-side-text a {
      color: #8b949e !important;
      font-weight: 700 !important;
      text-decoration: none !important;
      font-size: 0.8rem !important;
    }
    .fc .fc-list-event td { background: transparent !important; border-color: rgba(255,255,255,0.04) !important; }
    .fc .fc-list-event:hover td { background: rgba(255,255,255,0.03) !important; }
    .fc .fc-list-event-title, .fc .fc-list-event-title a {
      color: #c9d1d9 !important;
      font-weight: 600 !important;
      text-decoration: none !important;
    }
    .fc .fc-list-event-time { color: #484f58 !important; font-size: 0.75rem !important; }
    .fc .fc-list-empty { color: #484f58 !important; font-size: 0.85rem !important; }

    /* Timegrid */
    .fc .fc-timegrid-axis-cushion,
    .fc .fc-timegrid-slot-label-cushion {
      color: #484f58 !important;
      font-size: 0.72rem !important;
      font-weight: 600 !important;
    }
    .fc .fc-timegrid-slot { border-color: rgba(255,255,255,0.04) !important; }
    .fc .fc-timegrid-slot-minor { border-color: rgba(255,255,255,0.02) !important; }
    .fc .fc-timegrid-axis { border-color: rgba(255,255,255,0.06) !important; }
    .fc .fc-now-indicator-line { border-color: #388bfd !important; }

    /* Scrollbar */
    .fc-scroller::-webkit-scrollbar { width: 5px; height: 5px; }
    .fc-scroller::-webkit-scrollbar-track { background: transparent; }
    .fc-scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .admin-hero   { animation: fadeUp 0.3s ease both; }
    .calendar-card { animation: fadeUp 0.3s 0.08s ease both; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid d-flex justify-content-between">
    <a class="navbar-brand" href="/home">Sistema de Vacaciones</a>
    <form method="post" action="/logout">
      <button class="btn btn-outline-light btn-sm">Salir</button>
    </form>
  </div>
</nav>

<div class="container mt-4">

  <!-- HERO -->
  <div class="admin-hero shadow-soft mb-3">
    <div>
      <div class="hero-label">Panel Admin</div>
      <h4>Calendario de Ausencias</h4>
      <div class="muted">Visualiza vacaciones aprobadas y pendientes.</div>
    </div>
    <a class="btn-back" href="/home">← Volver</a>
  </div>

  <!-- LEYENDA -->
  <div class="legend-wrap">
    <div class="legend-item">
      <span class="legend-dot dot-approved"></span>
      Aprobada
    </div>
    <div class="legend-item">
      <span class="legend-dot dot-pending"></span>
      Pendiente
    </div>
  </div>

  <!-- CALENDAR CARD -->
  <div class="calendar-card">
    <div id="calendar"></div>
  </div>

</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales-all.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: 'auto',
    allDayText: 'Todo el día',
    locale: 'es',
    firstDay: 1,
    nowIndicator: true,
    navLinks: true,

    buttonText: {
      today: 'Hoy',
      month: 'Mes',
      week: 'Semana',
      day: 'Día',
      list: 'Lista'
    },

    events: {
      url: '/admin/calendar/events',
      failure: function() {
        alert('No se pudieron cargar los eventos.');
      }
    },

    eventClick: function(info) {
      const e = info.event;
      const username = e.extendedProps.username || 'N/D';
      const status   = e.extendedProps.status   || 'N/D';
      const days     = e.extendedProps.days      ?? 'N/D';
      alert(
        "Empleado: " + username + "\n" +
        "Inicio: "   + e.startStr + "\n" +
        "Fin: "      + e.endStr   + "\n" +
        "Días: "     + days       + "\n" +
        "Estatus: "  + status
      );
    },

    eventDidMount: function(info) {
      const status = (info.event.extendedProps.status || "").toUpperCase();
      if (status.includes("APPRO")) {
        info.el.style.backgroundColor = "#1a7f37";
        info.el.style.borderColor     = "#1a7f37";
      }
      if (status.includes("PEND")) {
        info.el.style.backgroundColor = "#9e6a03";
        info.el.style.borderColor     = "#9e6a03";
        info.el.style.color           = "#fff";
      }
    },

    customButtons: {
      exportPdf: {
        text: '↓ PDF',
        click: function() {
          const view = calendar.view;
          const from = view.currentStart.toISOString().slice(0,10);
          const toDate = new Date(view.currentEnd);
          toDate.setDate(toDate.getDate() - 1);
          const to = toDate.toISOString().slice(0,10);
          window.open(`/admin/calendar/export.pdf?from=${from}&to=${to}`, '_blank');
        }
      }
    },

    headerToolbar: {
      left:   'prev,next today exportPdf',
      center: 'title',
      right:  'dayGridMonth,timeGridWeek,listMonth'
    },
  });

  calendar.render();
});
</script>

</body>
</html>
