<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cambiar contraseña</title>

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/change-password.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="change-password-page">
  <div class="change-password-card">

    <div class="change-password-logo-wrap">
      <img src="/images/sg7t68nrdnkdvoop4iak.avif" class="logo-login" alt="Logo">
      <h4 class="change-password-title">Cambio de contraseña</h4>
      <span class="change-password-subtitle">Actualiza tu contraseña para continuar</span>
    </div>

    <div class="info-box">
      Estás usando una contraseña temporal. Debes cambiarla para continuar.
    </div>

    <div th:if="${err}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${err}"></span>
      <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>

    <form method="post" th:action="@{/change-password}" id="changePasswordForm">

      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" name="newPassword" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" name="confirmPassword" class="form-control" required>
      </div>

      <button class="btn-login" type="submit" id="btnChangePassword">
        Actualizar contraseña
      </button>
    </form>

    <div class="change-password-divider"><span>Inssoft © 2026</span></div>

  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>

<script>
  setTimeout(() => {
    document.querySelectorAll('.alert').forEach(a => {
      const alert = bootstrap.Alert.getOrCreateInstance(a);
      alert.close();
    });
  }, 5000);

  document.getElementById('changePasswordForm')?.addEventListener('submit', () => {
    const btn = document.getElementById('btnChangePassword');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = 'Actualizando...';
    }
  });
</script>

</body>
</html>
