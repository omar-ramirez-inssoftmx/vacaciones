<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Sistema de Vacaciones</title>

  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-page">
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo-wrap">
      <img src="/images/sg7t68nrdnkdvoop4iak.avif" class="logo-login" alt="Logo">
      <h4 class="login-title">Sistema de Vacaciones</h4>
      <span class="login-subtitle">Ingresa tus credenciales para continuar</span>
    </div>

    <!-- ALERTS -->
    <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
      ✓ Sesión cerrada correctamente
      <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
      ✕ Usuario o contraseña incorrectos
      <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <div th:if="${param.err}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <span th:if="${param.err[0] == 'INACTIVO'}">
        ✕ Tu usuario está inactivo. Contacta al administrador.
      </span>
      <span th:unless="${param.err[0] == 'INACTIVO'}">
        ✕ Usuario o contraseña incorrectos.
      </span>
      <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <!-- FORM -->
    <form method="post" action="/login" id="loginForm">

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text"
               name="username"
               class="form-control"
               placeholder="Ingresa tu usuario"
               autocomplete="username"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password"
               name="password"
               class="form-control"
               placeholder="••••••••"
               autocomplete="current-password"
               required>
      </div>

      <button class="btn-login" type="submit" id="btnLogin">
        Entrar
      </button>

    </form>

    <div class="login-divider"><span>Inssoft © 2026</span></div>

  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
  // Auto cerrar alerts
  setTimeout(() => {
    document.querySelectorAll('.alert').forEach(a => {
      const alert = bootstrap.Alert.getOrCreateInstance(a);
      alert.close();
    });
  }, 5000);

  // Anti doble click
  document.getElementById('loginForm')?.addEventListener('submit', () => {
    const btn = document.getElementById('btnLogin');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = 'Entrando...';
    }
  });
</script>
<!-- ========================= -->
<!-- LOADER GLOBAL -->
<!-- ========================= -->
<div id="globalLoader" class="global-loader" aria-hidden="true">
  <div class="global-loader__box">
    <div class="global-loader__spinner"></div>
    <div class="global-loader__title">Cargando<span class="global-loader__dots"></span></div>
  </div>
</div>

<link rel="stylesheet" href="/css/global-loader.css">
<script src="/js/global-loader.js"></script>
</body>
</html>
